<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Gold Signal{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { color: #f0c040 !important; font-weight: 700; letter-spacing: .5px; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #1c2128; border-bottom: 1px solid #30363d; }
    .btn-gold { background: #f0c040; color: #0d1117; font-weight: 600; border: none; }
    .btn-gold:hover { background: #d4a800; color: #0d1117; }
    .badge-active { background: #238636; }
    .badge-expired { background: #6e7681; }
    .text-gold { color: #f0c040; }
    .api-key-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
                   font-family: monospace; font-size: .85rem; padding: .5rem 1rem; word-break: break-all; }
    .form-control, .form-select { background: #0d1117; border-color: #30363d; color: #e6edf3; }
    .form-control:focus, .form-select:focus { background: #0d1117; border-color: #f0c040;
                                              color: #e6edf3; box-shadow: none; }
    .price-tag { font-size: 2.5rem; font-weight: 700; color: #f0c040; }
    a { color: #58a6ff; } a:hover { color: #79c0ff; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-bar-chart-line-fill me-2"></i>GoldSignal</a>
    <div class="ms-auto d-flex gap-2">
      {% if request.cookies.get('session_token') %}
        <a href="/dashboard" class="btn btn-sm btn-outline-light">Dashboard</a>
        <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
      {% else %}
        <a href="/login" class="btn btn-sm btn-outline-light">Login</a>
        <a href="/register" class="btn btn-sm btn-gold">Get Started</a>
      {% endif %}
    </div>
  </div>
</nav>
<main class="container py-5">{% block content %}{% endblock %}</main>
<footer class="text-center text-secondary py-4" style="font-size:.85rem;">
  &copy; 2026 GoldSignal &mdash; Automated XAUUSD Trading Signals
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
