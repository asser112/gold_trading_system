<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}GoldSignal{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main { flex: 1; }

    /* ── Typography ── */
    h1, h2, h3, h4, h5, h6 { color: #e6edf3; }
    .text-gold  { color: #f0c040 !important; }
    .text-green { color: #3fb950 !important; }
    .text-red   { color: #f85149 !important; }
    .text-muted { color: #8b949e !important; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { color: #79c0ff; text-decoration: underline; }
    code, .font-mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }

    /* ── Navbar ── */
    .gs-navbar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .gs-brand {
      font-weight: 700;
      font-size: 1rem;
      color: #f0c040 !important;
      letter-spacing: .4px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .gs-brand:hover { color: #f0c040 !important; text-decoration: none; }
    .gs-brand-icon {
      width: 20px; height: 20px;
      background: #f0c040;
      border-radius: 4px;
      display: inline-block;
      flex-shrink: 0;
    }
    .gs-ticker {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      margin-left: 16px;
      border-left: 1px solid #30363d;
      border-right: 1px solid #30363d;
      font-family: monospace;
      font-size: .82rem;
    }
    .gs-ticker-sym  { color: #8b949e; }
    .gs-ticker-price { color: #f0c040; font-weight: 600; }
    .gs-ticker-change { color: #3fb950; }

    /* ── Cards ── */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    .card-header {
      background: #1c2128;
      border-bottom: 1px solid #30363d;
      padding: .5rem 1rem;
      font-size: .82rem;
      color: #8b949e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px 8px 0 0 !important;
    }
    .card-header .card-title { color: #8b949e; margin: 0; font-weight: 500; }
    .card-body { padding: 1.25rem; }

    /* ── Buttons ── */
    .btn-gold {
      background: #f0c040; color: #0d1117;
      font-weight: 600; border: none; border-radius: 6px;
    }
    .btn-gold:hover { background: #d4a800; color: #0d1117; }
    .btn-outline-gs {
      background: transparent;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
    }
    .btn-outline-gs:hover { background: #21262d; color: #e6edf3; border-color: #8b949e; }
    .btn-ghost {
      background: transparent; border: none;
      color: #8b949e; font-size: .82rem;
      padding: 2px 8px; border-radius: 4px;
    }
    .btn-ghost:hover { background: #21262d; color: #e6edf3; }

    /* ── Forms ── */
    .form-control, .form-select {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      font-size: .9rem;
    }
    .form-control:focus, .form-select:focus {
      background: #0d1117;
      border-color: #f0c040;
      color: #e6edf3;
      box-shadow: 0 0 0 2px rgba(240,192,64,.15);
    }
    .form-control::placeholder { color: #484f58; }
    .form-label { font-size: .85rem; font-weight: 500; color: #e6edf3; margin-bottom: .35rem; }

    /* ── Badges / Pills ── */
    .badge-active  { background: #238636; color: #fff; border-radius: 12px; padding: 3px 10px; font-size: .78rem; }
    .badge-inactive{ background: #6e7681; color: #fff; border-radius: 12px; padding: 3px 10px; font-size: .78rem; }
    .badge-waiting { background: #9e6a03; color: #fff; border-radius: 12px; padding: 3px 10px; font-size: .78rem; }

    /* ── Stat strip ── */
    .stat-block { text-align: center; padding: 1rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; font-family: monospace; }
    .stat-label { font-size: .78rem; color: #8b949e; margin-top: 4px; }

    /* ── Signal card ── */
    .signal-direction {
      font-size: 3rem; font-weight: 700;
      font-family: monospace; line-height: 1;
    }
    .signal-buy  { color: #3fb950; }
    .signal-sell { color: #f85149; }
    .signal-hold { color: #8b949e; }
    .confidence-bar {
      height: 4px; background: #21262d; border-radius: 2px; overflow: hidden;
    }
    .confidence-bar-fill { height: 4px; border-radius: 2px; background: #3fb950; transition: width .3s; }

    /* ── Monospace boxes ── */
    .mono-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-family: monospace;
      font-size: .83rem;
      padding: .5rem 1rem;
      word-break: break-all;
      color: #e6edf3;
    }

    /* ── Coin selector ── */
    .coin-option {
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: .75rem 1rem;
      cursor: pointer;
      transition: border-color .15s;
    }
    .coin-option:hover { border-color: #8b949e; }
    .coin-option.selected { border-color: #f0c040; }
    .coin-radio { display: none; }

    /* ── Divider ── */
    hr { border-color: #30363d; opacity: 1; }

    /* ── Alerts ── */
    .alert-dark-warning {
      background: rgba(158,106,3,.15);
      border: 1px solid rgba(158,106,3,.4);
      color: #e6edf3; border-radius: 8px;
      padding: .9rem 1rem;
    }
    .alert-dark-info {
      background: rgba(31,111,235,.1);
      border: 1px solid rgba(31,111,235,.3);
      color: #e6edf3; border-radius: 8px;
      padding: .9rem 1rem;
    }
    .alert-dark-danger {
      background: rgba(248,81,73,.12);
      border: 1px solid rgba(248,81,73,.35);
      color: #e6edf3; border-radius: 8px;
      padding: .75rem 1rem;
    }

    /* ── Footer ── */
    .gs-footer {
      border-top: 1px solid #30363d;
      padding: .75rem 1.5rem;
      font-size: .82rem;
      color: #484f58;
      display: flex;
      align-items: center;
    }

    /* ── Tables ── */
    .gs-table {
      width: 100%; font-size: .85rem;
      border-collapse: collapse;
    }
    .gs-table th {
      color: #8b949e; font-weight: 500;
      padding: .5rem .9rem;
      border-bottom: 1px solid #30363d;
      text-align: left;
    }
    .gs-table td {
      padding: .55rem .9rem;
      border-bottom: 1px solid #21262d;
      color: #e6edf3;
    }
    .gs-table tr:last-child td { border-bottom: none; }
    .gs-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }

    /* ── Step list ── */
    .step-num {
      font-size: 1.6rem; font-weight: 700;
      color: #f0c040; font-family: monospace; line-height: 1;
    }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="gs-navbar">
  <a class="gs-brand" href="/">
    <span class="gs-brand-icon"></span>GoldSignal
  </a>

  <div class="gs-ticker">
    <span class="gs-ticker-sym">XAUUSD</span>
    <span class="gs-ticker-price" id="ticker-price">3,247.80</span>
    <span class="gs-ticker-change" id="ticker-change">+19.20  +0.59%</span>
  </div>

  <div class="ms-auto d-flex align-items-center gap-3">
    {% if request.cookies.get('session_token') %}
      <a href="/dashboard" class="text-muted small" style="text-decoration:none; color:#8b949e;">Dashboard</a>
      <a href="/pay" class="text-muted small" style="text-decoration:none; color:#8b949e;">Billing</a>
      <a href="/logout" class="btn btn-ghost">Logout</a>
    {% else %}
      <a href="/login" class="btn btn-outline-gs btn-sm px-3">Login</a>
      <a href="/register" class="btn btn-gold btn-sm px-3">Get Started</a>
    {% endif %}
  </div>
</nav>

<!-- ── Page content ── -->
<main>{% block content %}{% endblock %}</main>

<!-- ── Footer ── -->
<footer class="gs-footer">
  <span>&copy; 2026 GoldSignal &mdash; Automated XAUUSD Trading Signals</span>
  <span class="ms-auto d-flex gap-4">
    <a href="#" style="color:#484f58;">Terms</a>
    <a href="#" style="color:#484f58;">Privacy</a>
    <a href="#" style="color:#484f58;">Contact</a>
  </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Coin selector interactivity -->
<script>
document.querySelectorAll('.coin-option').forEach(function(opt) {
  opt.addEventListener('click', function() {
    document.querySelectorAll('.coin-option').forEach(function(o) {
      o.classList.remove('selected');
    });
    opt.classList.add('selected');
    opt.querySelector('input[type=radio]').checked = true;
  });
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
