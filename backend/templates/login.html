{% extends "base.html" %}
{% block title %}Login — GoldSignal{% endblock %}
{% block content %}

<div style="padding: 60px 1rem; display: flex; justify-content: center;">
  <div style="width: 100%; max-width: 380px;">

    <div class="mb-4">
      <h2 style="font-size: 1.4rem; margin-bottom: .4rem;">Login</h2>
      <p class="text-muted small mb-0">Sign in to access your dashboard and API key.</p>
    </div>

    {% if error %}
    <div class="alert-dark-danger mb-3">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="card">
      <div class="card-body">
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
          </div>
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label class="form-label mb-0">Password</label>
            </div>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
          <button type="submit" class="btn btn-gold w-100 mt-1">Login</button>
        </form>
      </div>
    </div>

    <p class="text-muted small mt-3 mb-0">
      No account?
      <a href="/register" style="color: #f0c040;">Create one for free</a>
    </p>

  </div>
</div>

{% endblock %}
